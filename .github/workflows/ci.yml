name: CI

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint (syntax check)
        run: node --check server.js && node --check src/app.js

      - name: Check modules load
        run: node -e "
          require('./src/errors');
          require('./lib/validate');
          console.log('Modules OK');
        "

      - name: Check data integrity
        run: node gitignore/check-data.js
        continue-on-error: true

name: CI

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Syntax check
        run: node --check server.js && node --check src/app.js && node --check src/middleware.js

      - name: Module load check
        run: node -e "require('./src/errors'); require('./lib/validate'); console.log('Modules OK')"

      - name: Run tests
        run: node --test

      - name: Data integrity
        run: node --check server.js

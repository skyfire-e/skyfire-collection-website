<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>skyf1re collection</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="home-page">
    <h1>skyf1re collection</h1>
    <div class="home-buttons">
      <a href="/dice" class="home-btn">
        <span class="icon">🎲</span>
        Dice
      </a>
      <a href="/miniatures" class="home-btn">
        <span class="icon">⚔️</span>
        Miniatures
      </a>
    </div>
  </div>

  <!-- Spreadsheet button (always visible) -->
  <div class="spreadsheet-bar">
    <button class="ss-public-btn" onclick="location.href='/spreadsheet'">📊 Spreadsheet</button>
  </div>

  <!-- Admin corner button -->
  <div class="admin-corner">
    <button id="adminBtn" title="Admin">🔐</button>
  </div>

  <!-- Admin actions (visible when logged in) -->
  <div class="admin-actions" id="adminActions" style="display:none">
    <button onclick="location.href='/admin#add'">+ Add</button>
    <button onclick="location.href='/admin#spreadsheet'">📊 Admin spreadsheet</button>
  </div>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <h2 id="authTitle">Admin Login</h2>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="admin">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="admin123">
      </div>
      <div style="display:flex;gap:12px;margin-top:20px">
        <button class="btn" id="loginBtn">Login</button>
        <button class="btn" id="logoutBtn" style="display:none;background:var(--danger)">Logout</button>
      </div>
      <p id="authError" style="color:var(--danger);margin-top:12px;font-size:0.85rem"></p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const adminBtn = document.getElementById('adminBtn');
    const authModal = document.getElementById('authModal');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const authError = document.getElementById('authError');
    const adminActions = document.getElementById('adminActions');

    adminBtn.addEventListener('click', () => authModal.classList.add('open'));

    authModal.addEventListener('click', (e) => {
      if (e.target === authModal) authModal.classList.remove('open');
    });

    loginBtn.addEventListener('click', async () => {
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
      const res = await API.post('/api/auth/login', { username, password });
      if (res.success) {
        currentUser = res.user;
        authModal.classList.remove('open');
        updateUI();
      } else {
        authError.textContent = 'Invalid credentials';
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await API.post('/api/auth/logout');
      currentUser = null;
      authModal.classList.remove('open');
      updateUI();
    });

    function updateUI() {
      if (isAdmin()) {
        adminActions.style.display = 'flex';
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-block';
        document.getElementById('authTitle').textContent = 'Admin Panel';
        // Check spreadsheet visibility
        API.get('/api/settings').then(s => {
          const spreadsheetBtn = adminActions.querySelector('button:last-child');
          if (spreadsheetBtn) spreadsheetBtn.style.display = s.showSpreadsheet !== false ? '' : 'none';
        });
      } else {
        adminActions.style.display = 'none';
        loginBtn.style.display = 'inline-block';
        logoutBtn.style.display = 'none';
        document.getElementById('authTitle').textContent = 'Admin Login';
      }
    }

    checkAuth().then(updateUI);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>skyf1re collection</title>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body>
  <div class="home-page">
    <h1>skyf1re collection</h1>
    <div class="home-buttons">
      <a href="/dice" class="home-btn">
        <span class="icon">🎲</span>
        Dice
      </a>
      <a href="/miniatures" class="home-btn">
        <span class="icon">⚔️</span>
        Miniatures
      </a>
    </div>
  </div>

  <div class="spreadsheet-bar">
    <button class="ss-public-btn" onclick="location.href='/spreadsheet'">📊 Spreadsheet</button>
  </div>

  <div class="admin-corner">
    <button id="adminBtn" title="Admin">🔐</button>
  </div>

  <div class="admin-actions" id="adminActions" style="display:none">
    <button onclick="location.href='/admin#add'">+ Add</button>
    <button onclick="location.href='/admin#spreadsheet'">📊 Admin spreadsheet</button>
  </div>

  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <h2 id="authTitle">Admin Login</h2>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="admin">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="admin123">
      </div>
      <div style="display:flex;gap:12px;margin-top:20px">
        <button class="btn" id="loginBtn">Login</button>
        <button class="btn" id="logoutBtn" style="display:none;background:var(--danger)">Logout</button>
      </div>
      <p id="authError" style="color:var(--danger);margin-top:12px;font-size:0.85rem"></p>
    </div>
  </div>

  <script type="module" src="/js/auth.js"></script>
  <script>
    fetch('/api/settings').then(r => r.json()).then(s => {
      if (s.siteName) { document.title = s.siteName; document.querySelector('h1').textContent = s.siteName; }
    }).catch(() => {});
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery - skyf1re Collection</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
</head>
<body>
  <div class="gallery-page">
    <a href="javascript:history.back()" class="back-link">← Back</a>
    <h1 id="pageTitle">Gallery</h1>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>

  <div class="admin-actions" id="adminActions" style="display:none">
    <button onclick="location.href='/admin#add'">+ Add</button>
    <button onclick="location.href='/admin#spreadsheet'">📊 Spreadsheet</button>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal modal-wide">
      <h2>Edit Item</h2>
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="editTitle">
      </div>
      <div class="form-group">
        <label>Author / Origin</label>
        <input type="text" id="editAuthor">
      </div>
      <div class="form-group">
        <label>Price</label>
        <input type="text" id="editPrice">
      </div>
      <div class="form-group mini-field">
        <label>Recaster</label>
        <input type="text" id="editRecaster">
      </div>
      <div class="form-group mini-field">
        <label>Command Points</label>
        <input type="text" id="editCombatPoints">
      </div>
      <div class="form-group mini-field">
        <label>Status</label>
        <input type="text" id="editStatus">
      </div>
      <div class="form-group">
        <label>Images <span class="edit-img-hint">(click X to remove, crop icon to edit)</span></label>
        <div class="edit-image-grid" id="editImageGrid"></div>
        <div style="margin-top:8px">
          <button type="button" class="btn btn-sm" id="addImagesBtn">+ Add Images</button>
          <input type="file" id="editImage" accept="image/*" multiple style="display:none">
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:20px">
        <button class="btn" id="saveEditBtn">Save</button>
        <button class="btn btn-danger" id="cancelEditBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Crop Modal -->
  <div class="modal-overlay" id="cropModal">
    <div class="modal modal-crop">
      <h2>Crop Image</h2>
      <div class="crop-container" id="cropContainer">
        <img id="cropImage" src="" alt="">
      </div>
      <div style="display:flex;gap:12px;margin-top:16px;justify-content:flex-end">
        <button class="btn btn-success" id="cropApplyBtn">Apply Crop</button>
        <button class="btn btn-danger" id="cropCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Lightbox Carousel -->
  <div class="lightbox-overlay" id="lightbox">
    <button class="lightbox-close" id="lbClose">&times;</button>
    <div class="lightbox-content">
      <div class="lightbox-image-wrap">
        <img id="lbImg" src="" alt="">
        <button class="lightbox-nav lightbox-prev" id="lbPrev">&#10094;</button>
        <button class="lightbox-nav lightbox-next" id="lbNext">&#10095;</button>
      </div>
      <div class="lightbox-info">
        <div class="lightbox-title" id="lbTitle"></div>
        <div class="lightbox-author" id="lbAuthor"></div>
        <div class="lightbox-dots" id="lbDots"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const section = params.get('section');
    const category = params.get('category');
    const grid = document.getElementById('galleryGrid');
    const title = document.getElementById('pageTitle');

// Lightbox state
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbTitle = document.getElementById('lbTitle');
const lbAuthor = document.getElementById('lbAuthor');
const lbDots = document.getElementById('lbDots');
let lbCurrentImages = [];
let lbCurrentImgIdx = 0;

    function setPageTitle(label) {
      title.textContent = label;
      document.title = label + ' - skyf1re Collection';
    }

    if (category) {
      API.get('/api/categories').then(data => {
        for (const section of Object.values(data)) {
          for (const cat of section.subcategories) {
            if (cat.id === category) {
              setPageTitle(cat.label);
              return;
            }
            if (cat.subcategories) {
              const found = cat.subcategories.find(s => s.id === category);
              if (found) { setPageTitle(found.label); return; }
            }
          }
        }
      });
    }

    function openLightbox(item) {
      lbCurrentImages = item.images && item.images.length > 0 ? item.images : [item.image];
      lbCurrentImgIdx = 0;
      updateLightbox(item);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function updateLightbox(item) {
      lbImg.src = lbCurrentImages[lbCurrentImgIdx];
      lbTitle.textContent = item.title;
      lbAuthor.textContent = item.author;

      lbDots.innerHTML = '';
      if (lbCurrentImages.length > 1) {
        lbCurrentImages.forEach((_, i) => {
          const dot = document.createElement('span');
          dot.className = 'lightbox-dot' + (i === lbCurrentImgIdx ? ' active' : '');
          dot.addEventListener('click', () => {
            lbCurrentImgIdx = i;
            lbImg.src = lbCurrentImages[i];
            lbDots.querySelectorAll('.lightbox-dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
          });
          lbDots.appendChild(dot);
        });
      }
    }

    function renderItems(items) {
      grid.innerHTML = '';
      if (items.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No items yet</p></div>';
        return;
      }
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'gallery-card';
        const imgCount = item.images && item.images.length > 0 ? item.images.length : 1;

        // Image wrap
        const imgWrap = document.createElement('div');
        imgWrap.className = 'img-wrap' + (imgCount > 1 ? ' multi-img' : '');
        const img = document.createElement('img');
        img.src = item.image;
        img.alt = item.title;
        img.loading = 'lazy';
        img.onerror = function() { this.src = '/images/default.svg'; };
        imgWrap.appendChild(img);
        if (imgCount > 1) {
          const badge = document.createElement('span');
          badge.className = 'img-count-badge';
          badge.textContent = imgCount + ' photos';
          imgWrap.appendChild(badge);
        }
        card.appendChild(imgWrap);

        // Card body — title & author via textContent (XSS-safe)
        const body = document.createElement('div');
        body.className = 'card-body';
        const titleDiv = document.createElement('div');
        titleDiv.className = 'title';
        titleDiv.textContent = item.title;
        body.appendChild(titleDiv);
        const authorDiv = document.createElement('div');
        authorDiv.className = 'author';
        authorDiv.textContent = item.author;
        body.appendChild(authorDiv);
        card.appendChild(body);

        // Admin actions
        if (isAdmin()) {
          const actions = document.createElement('div');
          actions.className = 'card-actions';
          const editBtn = document.createElement('button');
          editBtn.className = 'edit-btn';
          editBtn.dataset.id = item.id;
          editBtn.textContent = '✏️ Edit';
          actions.appendChild(editBtn);
          const delBtn = document.createElement('button');
          delBtn.className = 'del-btn';
          delBtn.dataset.id = item.id;
          delBtn.textContent = '🗑️ Delete';
          actions.appendChild(delBtn);
          card.appendChild(actions);
        }

        grid.appendChild(card);

        card.addEventListener('click', (e) => {
          if (e.target.closest('.card-actions')) return;
          openLightbox(item);
        });

        if (isAdmin()) {
          card.querySelector('.del-btn').addEventListener('click', async (e) => {
            e.stopPropagation();
            if (confirm('Delete "' + item.title + '"?')) {
              await API.del('/api/items/' + item.id);
              loadItems();
            }
          });
          card.querySelector('.edit-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            openEdit(item);
          });
        }
      });
    }

    async function loadItems() {
      let url = '/api/items';
      if (section) url += '?section=' + section;
      if (category) url += (section ? '&' : '?') + 'category=' + category;
      const items = await API.get(url);
      renderItems(items);
    }

    // Edit modal with crop + reorder
    const editModal = document.getElementById('editModal');
    const editImageGrid = document.getElementById('editImageGrid');
    let editingId = null;
    let editSlots = []; // { type: 'keep'|'replace'|'new', originalIdx, src, file? }
    let editCurrentItem = null;

    function openEdit(item) {
      editingId = item.id;
      editCurrentItem = item;
      const imgs = item.images && item.images.length > 0 ? item.images : (item.images ? [] : [item.image]);
      editSlots = imgs.map((src, i) => ({ type: 'keep', originalIdx: i, src }));
      document.getElementById('editId').value = item.id;
      document.getElementById('editTitle').value = item.title;
      document.getElementById('editAuthor').value = item.author;
      document.getElementById('editPrice').value = item.price;
      document.getElementById('editRecaster').value = item.recaster || '';
      document.getElementById('editCombatPoints').value = item.combatPoints || '';
      document.getElementById('editStatus').value = item.status || '';
      // Show mini-fields only for miniatures items
      document.querySelectorAll('#editModal .mini-field').forEach(el => {
        el.style.display = item.section === 'miniatures' ? 'block' : 'none';
      });
      document.getElementById('editImage').value = '';
      renderEditImages();
      editModal.classList.add('open');
    }

    function renderEditImages() {
      editImageGrid.innerHTML = '';
      editSlots.forEach((slot, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'edit-img-item';
        wrapper.innerHTML = `
          <img src="${slot.src}" alt="" onerror="this.src='/images/default.svg'">
          <button class="edit-img-move-left">&lsaquo;</button>
          <button class="edit-img-move-right">&rsaquo;</button>
          <button class="edit-img-crop">&#9998;</button>
          <button class="edit-img-del">&times;</button>
          <span class="edit-img-idx">#${i + 1}</span>
        `;
        wrapper.querySelector('.edit-img-del').addEventListener('click', () => {
          editSlots.splice(i, 1);
          renderEditImages();
        });
        wrapper.querySelector('.edit-img-crop').addEventListener('click', () => {
          openCrop(slot.src, { slotIdx: i });
        });
        const leftBtn = wrapper.querySelector('.edit-img-move-left');
        const rightBtn = wrapper.querySelector('.edit-img-move-right');
        if (i === 0) leftBtn.disabled = true;
        if (i === editSlots.length - 1) rightBtn.disabled = true;
        leftBtn.addEventListener('click', () => {
          [editSlots[i - 1], editSlots[i]] = [editSlots[i], editSlots[i - 1]];
          renderEditImages();
        });
        rightBtn.addEventListener('click', () => {
          [editSlots[i], editSlots[i + 1]] = [editSlots[i + 1], editSlots[i]];
          renderEditImages();
        });
        editImageGrid.appendChild(wrapper);
      });
    }

    // --- Crop Modal ---
    const cropModal = document.getElementById('cropModal');
    const cropImage = document.getElementById('cropImage');
    let cropper = null;
    let cropCtx = null; // { slotIdx?: number, newFilesQueue?: string[] }

    function openCrop(imageSrc, ctx) {
      cropImage.src = imageSrc;
      cropModal.classList.add('open');
      setTimeout(() => {
        if (cropper) cropper.destroy();
        cropper = new Cropper(cropImage, {
          aspectRatio: NaN,
          viewMode: 1,
          autoCropArea: 0.9,
          background: false,
        });
      }, 200);
      cropCtx = ctx;
    }

    function closeCrop() {
      if (cropper) { cropper.destroy(); cropper = null; }
      cropModal.classList.remove('open');
      cropCtx = null;
    }

    function applyCrop() {
      if (!cropper || !cropCtx) return;
      const canvas = cropper.getCroppedCanvas({ imageSmoothingQuality: 'high' });
      const ctx = cropCtx; // snapshot before closeCrop nulls it
      const queue = ctx.newFilesQueue ? [...ctx.newFilesQueue] : null;
      const slotIdx = ctx.slotIdx;

      canvas.toBlob(blob => {
        const file = new File([blob], 'cropped-' + Date.now() + '.jpg', { type: 'image/jpeg' });

        if (typeof slotIdx === 'number' && editSlots[slotIdx]) {
          const slot = editSlots[slotIdx];
          editSlots[slotIdx] = { type: 'replace', originalIdx: slot.originalIdx, file, src: URL.createObjectURL(blob) };
          renderEditImages();
          closeCrop();
          return;
        }

        // New file — append at end
        editSlots.push({ type: 'new', originalIdx: null, file, src: URL.createObjectURL(blob) });
        renderEditImages();

        if (queue && queue.length > 0) {
          closeCrop();
          const nextUrl = queue.shift();
          openCrop(nextUrl, { newFilesQueue: queue });
        } else {
          closeCrop();
        }
      }, 'image/jpeg', 0.92);
    }

    document.getElementById('cropApplyBtn').addEventListener('click', applyCrop);
    document.getElementById('cropCancelBtn').addEventListener('click', closeCrop);
    cropModal.addEventListener('click', (e) => { if (e.target === cropModal) closeCrop(); });

    // Intercept file input for cropping new images
    document.getElementById('editImage').addEventListener('change', function() {
      const files = Array.from(this.files);
      if (files.length === 0) return;
      this.value = '';
      const reader = new FileReader();
      const remaining = files.slice(1).map(f => URL.createObjectURL(f));
      reader.onload = (e) => {
        openCrop(e.target.result, { newFilesQueue: remaining });
      };
      reader.readAsDataURL(files[0]);
    });

    // Custom Add Images button triggers hidden file input
    document.getElementById('addImagesBtn').addEventListener('click', () => {
      document.getElementById('editImage').click();
    });

    // Save
    document.getElementById('saveEditBtn').addEventListener('click', async () => {
      const fd = new FormData();
      fd.append('title', document.getElementById('editTitle').value);
      fd.append('author', document.getElementById('editAuthor').value);
      fd.append('price', document.getElementById('editPrice').value);
      fd.append('recaster', document.getElementById('editRecaster').value);
      fd.append('combatPoints', document.getElementById('editCombatPoints').value);
      fd.append('status', document.getElementById('editStatus').value);

      const allRemoved = [];
      const finalOrder = [];

      for (const slot of editSlots) {
        if (slot.type === 'keep') {
          finalOrder.push(slot.originalIdx);
        } else if (slot.type === 'replace') {
          fd.append('images', slot.file);
          finalOrder.push(-1);
          if (!allRemoved.includes(slot.originalIdx)) allRemoved.push(slot.originalIdx);
        } else if (slot.type === 'new') {
          fd.append('images', slot.file);
          finalOrder.push(-1);
        }
      }

      // Find original indices that were fully deleted (not in any slot)
      const originalImgs = editCurrentItem.images && editCurrentItem.images.length > 0 ? editCurrentItem.images : (editCurrentItem.images ? [] : [editCurrentItem.image]);
      for (let i = 0; i < originalImgs.length; i++) {
        const stillPresent = editSlots.some(s => (s.type === 'keep' || s.type === 'replace') && s.originalIdx === i);
        if (!stillPresent && !allRemoved.includes(i)) {
          allRemoved.push(i);
        }
      }

      if (allRemoved.length > 0) {
        fd.append('imagesToRemove', JSON.stringify(allRemoved));
      }
      fd.append('finalOrder', JSON.stringify(finalOrder));

      await API.put('/api/items/' + editingId, fd);
      editModal.classList.remove('open');
      editSlots = [];
      editCurrentItem = null;
      loadItems();
    });

    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      editModal.classList.remove('open');
      editSlots = [];
    });

    editModal.addEventListener('click', (e) => {
      if (e.target === editModal) {
        editModal.classList.remove('open');
        editSlots = [];
      }
    });

    // Lightbox controls
    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.getElementById('lbPrev').addEventListener('click', () => {
      if (lbCurrentImages.length === 0) return;
      lbCurrentImgIdx = lbCurrentImgIdx > 0 ? lbCurrentImgIdx - 1 : lbCurrentImages.length - 1;
      lbImg.src = lbCurrentImages[lbCurrentImgIdx];
      updateDots();
    });

    document.getElementById('lbNext').addEventListener('click', () => {
      if (lbCurrentImages.length === 0) return;
      lbCurrentImgIdx = lbCurrentImgIdx < lbCurrentImages.length - 1 ? lbCurrentImgIdx + 1 : 0;
      lbImg.src = lbCurrentImages[lbCurrentImgIdx];
      updateDots();
    });

    function updateDots() {
      lbDots.querySelectorAll('.lightbox-dot').forEach((d, i) => {
        d.classList.toggle('active', i === lbCurrentImgIdx);
      });
    }

    // Touch swipe for lightbox
    let touchStartX = 0;
    lbImg.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    lbImg.addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) document.getElementById('lbNext').click();
        else document.getElementById('lbPrev').click();
      }
    }, { passive: true });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
      if (e.key === 'ArrowRight') document.getElementById('lbNext').click();
    });

    checkAuth().then(() => {
      if (isAdmin()) document.getElementById('adminActions').style.display = 'flex';
      loadItems();
    });
  </script>
</body>
</html>

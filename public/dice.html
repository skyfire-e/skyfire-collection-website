<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dice - skyf1re Collection</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="section-page">
    <a href="/" class="back-link">← Back to Home</a>
    <h1>Dice</h1>
    <div class="category-grid" id="categoryGrid"></div>
  </div>

  <div class="admin-actions" id="adminActions" style="display:none">
    <button onclick="location.href='/admin#add'">+ Add</button>
    <button onclick="location.href='/admin#spreadsheet'">📊 Spreadsheet</button>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const CATEGORY = 'dice';
    const grid = document.getElementById('categoryGrid');

    API.get('/api/categories').then(data => {
      const cats = data[CATEGORY];
      if (!cats) return;
      cats.subcategories.forEach(c => {
        const a = document.createElement('a');
        a.href = '/gallery?section=' + CATEGORY + '&category=' + c.id;
        a.className = 'category-btn';
        a.textContent = c.label;
        grid.appendChild(a);
      });
    });

    checkAuth().then(() => {
      if (isAdmin()) document.getElementById('adminActions').style.display = 'flex';
    });
  </script>
</body>
</html>
